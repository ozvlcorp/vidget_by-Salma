server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Proxy MoySklad API — avoids browser CORS preflight entirely
    location /api/moysklad/ {
        proxy_pass https://api.moysklad.ru/api/remap/1.2/;
        proxy_set_header Host api.moysklad.ru;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        # Strip cookies/sensitive headers going upstream
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP $remote_addr;

        # Prevent browser from showing its own credential dialog on 401
        proxy_hide_header WWW-Authenticate;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
